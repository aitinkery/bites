<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#E07A5F"/>
      <stop offset="100%" stop-color="#C84B31"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- A stylized bite mark on a circle (a plate / cookie) -->
  <g transform="translate(256 270)">
    <circle r="150" fill="#FAF6F0"/>
    <!-- Bite taken out of the upper-right -->
    <path d="M 60 -130 a 70 70 0 1 0 95 95 a 150 150 0 0 1 -95 -95 z" fill="#C84B31"/>
    <!-- Crumbs -->
    <circle cx="170" cy="-40" r="9" fill="#FAF6F0"/>
    <circle cx="195" cy="10"  r="6" fill="#FAF6F0"/>
    <circle cx="155" cy="-95" r="5" fill="#FAF6F0"/>
  </g>
</svg>
